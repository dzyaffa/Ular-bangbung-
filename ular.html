<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Ular Bangbung</title>
    <style>
        * { touch-action: manipulation; }
        body {
            margin: 0;
            padding: 10px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        canvas {
            border: 5px solid;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 30px rgba(0,0,0,0.2);
            background: #1a1a2e;
            max-width: 95vw;
            max-height: 45vh;
            touch-action: none;
        }
        .ui-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        .score {
            background: rgba(255,255,255,0.9);
            padding: 10px 18px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        /* MENU MODE BESAR */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mode-btn {
            padding: 18px 25px;
            border: 4px solid #FF6B6B;
            background: white;
            color: #FF6B6B;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            box-shadow: 0 10px 25px rgba(255,107,107,0.3);
            min-width: 120px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .mode-btn:hover { transform: translateY(-3px); }
        .mode-btn.active {
            background: linear-gradient(45deg, #FF6B6B, #FF8E8E);
            color: white;
            box-shadow: 0 15px 35px rgba(255,107,107,0.5);
            transform: scale(1.03);
        }
        .mode-btn .emoji { font-size: 24px; margin-bottom: 3px; }
        .mode-btn .speed-text { font-size: 11px; opacity: 0.9; }
        
        /* MENU WARNA ULAR BARU - BESAR */
        .color-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 65px;
            height: 65px;
            border: 4px solid white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .color-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .color-btn.active {
            border-width: 6px;
            box-shadow: 0 0 0 3px white, 0 15px 40px rgba(0,0,0,0.5);
            transform: scale(1.15);
        }
        .color-btn::before {
            content: '🐍';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            z-index: 2;
        }
        .color-btn span {
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        
        /* Colors */
        .red { background: linear-gradient(45deg, #FF6B6B, #FF8E8E); }
        .blue { background: linear-gradient(45deg, #4ECDC4, #44A08D); }
        .purple { background: linear-gradient(45deg, #A55EEA, #8B5CF6); }
        .green { background: linear-gradient(45deg, #00F5A0, #00D4AA); }
        .yellow { background: linear-gradient(45deg, #FFD93D, #FF6B35); }
        .orange { background: linear-gradient(45deg, #FF8C42, #FF6B35); }
        
        /* KONTROL BESAR */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            max-width: 420px;
            margin-top: 20px;
            padding: 20px;
        }
        .btn {
            aspect-ratio: 1;
            border: 5px solid #FF6B6B;
            border-radius: 50%;
            font-size: 36px;
            color: #FF6B6B;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            min-height: 90px;
            min-width: 90px;
        }
        .btn:hover { transform: translateY(-3px); }
        .btn:active { transform: scale(0.92); }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        
        h1 {
            font-size: clamp(24px, 6vw, 36px);
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid #FF6B6B;
        }
        .restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #FF6B6B, #FF8E8E);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        .speed-info {
            font-size: 14px;
            color: #666;
            margin: 8px 0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h1>🐍 Ular Bangbung</h1>
    
    <!-- MENU WARNA ULAR BARU -->
    <div class="color-selector">
        <button class="color-btn red active" data-color="red" data-head="#FF6B6B" data-body="#FF8E8E"></button>
        <button class="color-btn blue" data-color="blue" data-head="#4ECDC4" data-body="#44A08D"></button>
        <button class="color-btn purple" data-color="purple" data-head="#A55EEA" data-body="#8B5CF6"></button>
        <button class="color-btn green" data-color="green" data-head="#00F5A0" data-body="#00D4AA"><span>🟢</span></button>
        <button class="color-btn yellow" data-color="yellow" data-head="#FFD93D" data-body="#FF6B35"><span>🟡</span></button>
        <button class="color-btn orange" data-color="orange" data-head="#FF8C42" data-body="#FF6B35"><span>🟠</span></button>
    </div>

    <!-- MENU MODE -->
    <div class="mode-selector">
        <button class="mode-btn active" data-speed="200">
            <span class="emoji">🐌</span>
            Lambat
            <div class="speed-text">200ms</div>
        </button>
        <button class="mode-btn" data-speed="150">
            <span class="emoji">🐢</span>
            Normal
            <div class="speed-text">150ms</div>
        </button>
        <button class="mode-btn" data-speed="100">
            <span class="emoji">🐇</span>
            Cepat
            <div class="speed-text">100ms</div>
        </button>
        <button class="mode-btn" data-speed="70">
            <span class="emoji">⚡</span>
            Gila
            <div class="speed-text">70ms</div>
        </button>
    </div>

    <div class="ui-top">
        <div class="score">Skor: <span id="score">0</span></div>
        <div class="score">Level: <span id="level">1</span></div>
        <div class="score">Panjang: <span id="length">3</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="speed-info">Speed: <span id="speedDisplay">Normal (150ms)</span></div>

    <div class="controls">
        <div></div>
        <button class="btn btn-up" id="up">↑</button>
        <div></div>
        <button class="btn btn-left" id="left">←</button>
        <button class="btn btn-down" id="down">↓</button>
        <button class="btn btn-right" id="right">→</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>💥 Ular Bangbung Mati!</h2>
        <p>Skor Akhir: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">🔄 Main Lagi!</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const lengthEl = document.getElementById('length');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const speedDisplayEl = document.getElementById('speedDisplay');

        // Warna global
        let snakeHeadColor = '#FF6B6B';
        let snakeBodyColor = '#FF8E8E';

        function resizeCanvas() {
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.35);
            canvas.width = size;
            canvas.height = size;
            blockSize = size / 25;
            canvas.style.borderColor = snakeHeadColor;
        }
        let blockSize = 20;
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        let food = {};
        let dx = 1, dy = 0;
        let score = 0;
        let gameRunning = true;
        let currentSpeed = 150;
        let gameInterval;

        const modeNames = {
            200: 'Lambat (200ms)',
            150: 'Normal (150ms)',
            100: 'Cepat (100ms)',
            70: 'Gila (70ms)'
        };

        // Color selector
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                snakeHeadColor = btn.dataset.head;
                snakeBodyColor = btn.dataset.body;
                canvas.style.borderColor = snakeHeadColor;
            };
        });

        // Mode selector
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSpeed = parseInt(btn.dataset.speed);
                speedDisplayEl.textContent = modeNames[currentSpeed];
                
                if (gameRunning) {
                    clearInterval(gameInterval);
                    gameLoop();
                }
            };
        });

        function randomFood() {
            food = {
                x: Math.floor(Math.random() * 22) + 1,
                y: Math.floor(Math.random() * 22) + 1
            };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    randomFood();
                    return;
                }
            }
        }

        function draw() {
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
            gradient.addColorStop(0, '#2d1b69');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            snake.forEach((segment, index) => {
                ctx.save();
                ctx.shadowColor = snakeHeadColor;
                ctx.shadowBlur = index === 0 ? 25 : 12;
                ctx.fillStyle = index === 0 ? snakeHeadColor : snakeBodyColor;
                ctx.fillRect(segment.x * blockSize, segment.y * blockSize, blockSize - 2, blockSize - 2);
                ctx.shadowBlur = 0;
                
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(segment.x * blockSize + 4, segment.y * blockSize + 4, 5, 5);
                    ctx.fillRect(segment.x * blockSize + blockSize - 9, segment.y * blockSize + 4, 5, 5);
                    ctx.fillStyle = 'black';
                    ctx.fillRect(segment.x * blockSize + 5, segment.y * blockSize + 5, 3, 3);
                    ctx.fillRect(segment.x * blockSize + blockSize - 8, segment.y * blockSize + 5, 3, 3);
                }
                ctx.restore();
            });

            ctx.save();
            ctx.shadowColor = '#4ECDC4';
            ctx.shadowBlur = 20 + Math.sin(Date.now() * 0.01) * 5;
            ctx.fillStyle = '#4ECDC4';
            ctx.beginPath();
            ctx.arc(food.x * blockSize + blockSize/2, food.y * blockSize + blockSize/2, blockSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function update() {
            if (!gameRunning) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= 25 || head.y < 0 || head.y >= 25) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                randomFood();
            } else {
                snake.pop();
            }

            scoreEl.textContent = score;
            levelEl.textContent = Math.floor(score / 50) + 1;
            lengthEl.textContent = snake.length;
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, currentSpeed);
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        function changeDirection(newDx, newDy) {
            if (gameRunning && (newDx !== -dx || newDy !== -dy)) {
                dx = newDx;
                dy = newDy;
            }
        }

        function restartGame() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1; 
            dy = 0;
            score = 0;
            gameRunning = true;
            gameOverEl.style.display = 'none';
            randomFood();
            gameLoop();
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': changeDirection(0, -1); break;
                case 'ArrowDown': changeDirection(0, 1); break;
                case 'ArrowLeft': changeDirection(-1, 0); break;
                case 'ArrowRight': changeDirection(1, 0); break;
            }
        });

        ['up', 'down', 'left', 'right'].forEach(dir => {
            document.getElementById(dir).onclick = () => {
                const directions = {up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0]};
                changeDirection(...directions[dir]);
            };
        });

        let startX, startY;
        canvas.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            if (!startX || !startY) return;
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = startX - endX;
            const diffY = startY - endY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                changeDirection(diffX > 0 ? -1 : 1, 0);
            } else {
                changeDirection(0, diffY > 0 ? -1 : 1);
            }
            startX = startY = 0;
        });

        randomFood();
        gameLoop();
    </script>
</body>
</html>
